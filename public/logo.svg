<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Connection lines (subtle) -->
  <line x1="24" y1="10" x2="11" y2="32" stroke="#22284F" stroke-width="1.1" stroke-opacity="0.22" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="37" y2="32" stroke="#22284F" stroke-width="1.1" stroke-opacity="0.22" stroke-linecap="round"/>
  <line x1="11" y1="32" x2="37" y2="32" stroke="#22284F" stroke-width="1.1" stroke-opacity="0.22" stroke-linecap="round"/>
  <!-- Center glow -->
  <circle cx="24" cy="24" r="5" fill="#6F72FF" fill-opacity="0.08"/>
  <!-- Money node — top, blue -->
  <circle cx="24" cy="10" r="5" fill="#4F7CFF"/>
  <circle cx="24" cy="10" r="5" fill="url(#money-glow)" opacity="0.4"/>
  <!-- Health node — bottom left, green -->
  <circle cx="11" cy="32" r="5" fill="#5BB88A"/>
  <circle cx="11" cy="32" r="5" fill="url(#health-glow)" opacity="0.4"/>
  <!-- Life node — bottom right, orange -->
  <circle cx="37" cy="32" r="5" fill="#F5A623"/>
  <circle cx="37" cy="32" r="5" fill="url(#life-glow)" opacity="0.4"/>
  <!-- Inner dots (bright highlights) -->
  <circle cx="24" cy="8.5" r="1.5" fill="white" fill-opacity="0.86"/>
  <circle cx="11" cy="30.5" r="1.5" fill="white" fill-opacity="0.86"/>
  <circle cx="37" cy="30.5" r="1.5" fill="white" fill-opacity="0.86"/>
  <defs>
    <radialGradient id="money-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#4F7CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="health-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5BB88A"/>
      <stop offset="100%" stop-color="#5BB88A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="life-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
